<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Husky Hurdles</title>
  <style>
    body{ margin:0; background:#bfe9ff; font-family:Arial, sans-serif; overflow:hidden; }
    canvas{ display:block; margin:0 auto; background:#e6f7ff; touch-action:none; }
  </style>
</head>
<body>
<canvas id="c" width="900" height="520"></canvas>

<script>
/* ===========================================================
   HUSKY HURDLES — “ALL-IN-ONE” PROJECT FILE
   - 3 lanes + jump
   - HB coins + meat energy
   - Shop (accessories/skins/powerups) + code box
   - Difficulty + hunter bursts
   - Daily HB + 7-day streak unlock
   - OP rainbow via code GOATWARREN
   - Season pass (40 tiers / 50 XP) Frosty Festival (60 days)
   - Campaign mode + boss timer + WINNER reward
   - Save button + Export/Import Save for multi-device
   - Local leaderboards (HB earned + distance)
=========================================================== */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// ---------- helpers ----------
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rand=(a,b)=>a+Math.random()*(b-a);
const now=()=>Date.now();
const DAY=24*60*60*1000;
const todayStr=()=>{const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
const yestStr=()=>{const d=new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function rects(a,b){return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;}
function safeName(s){s=(s||"").trim(); return s? s.slice(0,16):"Player";}

// ---------- save ----------
const SAVE_KEY="husky_hurdles_allinone_v1";
const DEFAULT_SAVE={
  playerName:"Player",
  huskyBucks:5,
  bestDistance:0,
  lastDaily:null,
  streak:0,
  opRainbow:false,
  balancedRainbow:false,

  // season
  seasonName:"Frosty Festival",
  seasonStartMs:null,
  seasonDays:60,
  seasonXP:0,
  seasonTier:1,
  seasonClaimed:[],

  // campaign
  campaignUnlocked:1,

  // cosmetics/skins
  cosmetics:{
    scarf_red:{owned:false,equipped:false},
    scarf_blue:{owned:false,equipped:false},
    beanie:{owned:false,equipped:false},
    sunglasses:{owned:false,equipped:false},
    tag:{owned:false,equipped:false},
  },
  skinsOwned:{
    default:true,
    fire:false,
    cyber:false,
    golden:false,
    rider:false,
    frostking:false,
    cosmolight:false,
    cartoon:false
  },
  skinEquipped:"default",

  leaderboards:{ coins:[], distance:[] }
};

function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

function loadSave(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return deepClone(DEFAULT_SAVE);
    const p=JSON.parse(raw);
    const s=deepClone(DEFAULT_SAVE);

    if(typeof p.playerName==="string") s.playerName=p.playerName;
    if(typeof p.huskyBucks==="number") s.huskyBucks=p.huskyBucks;
    if(typeof p.bestDistance==="number") s.bestDistance=p.bestDistance;
    if(typeof p.lastDaily==="string" || p.lastDaily===null) s.lastDaily=p.lastDaily;
    if(typeof p.streak==="number") s.streak=p.streak;
    if(typeof p.opRainbow==="boolean") s.opRainbow=p.opRainbow;
    if(typeof p.balancedRainbow==="boolean") s.balancedRainbow=p.balancedRainbow;

    if(typeof p.seasonName==="string") s.seasonName=p.seasonName;
    if(typeof p.seasonStartMs==="number" || p.seasonStartMs===null) s.seasonStartMs=p.seasonStartMs;
    if(typeof p.seasonDays==="number") s.seasonDays=p.seasonDays;
    if(typeof p.seasonXP==="number") s.seasonXP=p.seasonXP;
    if(typeof p.seasonTier==="number") s.seasonTier=p.seasonTier;
    if(Array.isArray(p.seasonClaimed)) s.seasonClaimed=p.seasonClaimed;

    if(typeof p.campaignUnlocked==="number") s.campaignUnlocked=p.campaignUnlocked;

    if(p.cosmetics){
      for(const k in s.cosmetics){
        if(p.cosmetics[k]){
          s.cosmetics[k].owned=!!p.cosmetics[k].owned;
          s.cosmetics[k].equipped=!!p.cosmetics[k].equipped;
        }
      }
    }

    if(p.skinsOwned){
      for(const k in s.skinsOwned){
        if(k in p.skinsOwned) s.skinsOwned[k]=!!p.skinsOwned[k];
      }
    }
    if(typeof p.skinEquipped==="string") s.skinEquipped=p.skinEquipped;

    if(p.leaderboards){
      if(Array.isArray(p.leaderboards.coins)) s.leaderboards.coins=p.leaderboards.coins;
      if(Array.isArray(p.leaderboards.distance)) s.leaderboards.distance=p.leaderboards.distance;
    }

    return s;
  }catch(e){
    return deepClone(DEFAULT_SAVE);
  }
}

let saveData=loadSave();
function saveNow(){
  saveData.playerName=playerName;
  saveData.huskyBucks=huskyBucks;
  saveData.bestDistance=bestDistance;
  saveData.lastDaily=lastDaily;
  saveData.streak=streak;
  saveData.opRainbow=opRainbow;
  saveData.balancedRainbow=balancedRainbow;

  saveData.seasonName=seasonName;
  saveData.seasonStartMs=seasonStartMs;
  saveData.seasonDays=seasonDays;
  saveData.seasonXP=seasonXP;
  saveData.seasonTier=seasonTier;
  saveData.seasonClaimed=[...seasonClaimed];

  saveData.campaignUnlocked=campaignUnlocked;

  saveData.cosmetics=cosmetics;
  saveData.skinsOwned=skinsOwned;
  saveData.skinEquipped=skinEquipped;

  saveData.leaderboards=leaderboards;

  localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
  toast("Saved ✅", 1200);
}

// Export/Import save for phone ↔ laptop
function exportSaveString(){
  saveNow();
  const raw=localStorage.getItem(SAVE_KEY) || "";
  return btoa(unescape(encodeURIComponent(raw)));
}
function importSaveString(code){
  try{
    const raw=decodeURIComponent(escape(atob((code||"").trim())));
    const obj=JSON.parse(raw);
    localStorage.setItem(SAVE_KEY, JSON.stringify(obj));
    saveData=loadSave();
    // reload runtime from save
    applySaveToRuntime();
    toast("Imported ✅ (refreshing state)", 1600);
  }catch{
    toast("Import failed ❌", 1600);
  }
}

// ---------- runtime vars ----------
let playerName=safeName(saveData.playerName);
let huskyBucks=saveData.huskyBucks;
let bestDistance=saveData.bestDistance;
let lastDaily=saveData.lastDaily;
let streak=saveData.streak;

let opRainbow=!!saveData.opRainbow;
let balancedRainbow=!!saveData.balancedRainbow;

let seasonName=saveData.seasonName;
let seasonStartMs=saveData.seasonStartMs;
let seasonDays=saveData.seasonDays;
let seasonXP=saveData.seasonXP;
let seasonTier=saveData.seasonTier;
let seasonClaimed=new Set(saveData.seasonClaimed||[]);

let campaignUnlocked=saveData.campaignUnlocked;

let cosmetics=saveData.cosmetics;
let skinsOwned=saveData.skinsOwned;
let skinEquipped=saveData.skinEquipped;

let leaderboards=saveData.leaderboards || {coins:[], distance:[]};

function applySaveToRuntime(){
  playerName=safeName(saveData.playerName);
  huskyBucks=saveData.huskyBucks;
  bestDistance=saveData.bestDistance;
  lastDaily=saveData.lastDaily;
  streak=saveData.streak;
  opRainbow=!!saveData.opRainbow;
  balancedRainbow=!!saveData.balancedRainbow;

  seasonName=saveData.seasonName;
  seasonStartMs=saveData.seasonStartMs;
  seasonDays=saveData.seasonDays;
  seasonXP=saveData.seasonXP;
  seasonTier=saveData.seasonTier;
  seasonClaimed=new Set(saveData.seasonClaimed||[]);

  campaignUnlocked=saveData.campaignUnlocked;

  cosmetics=saveData.cosmetics;
  skinsOwned=saveData.skinsOwned;
  skinEquipped=saveData.skinEquipped;

  leaderboards=saveData.leaderboards || {coins:[], distance:[]};
}

// ---------- UI toast ----------
let toastMsg="", toastUntil=0;
function toast(msg,ms=1400){ toastMsg=msg; toastUntil=now()+ms; }

// ---------- lanes ----------
const LANES=3;
const laneX=[310,450,590];
const groundY=420;

// ---------- difficulty ----------
const diffs=[
  {name:"Easy",   spawnMin:0.95,spawnMax:1.35,speedMin:170,speedMax:240,burstChance:0.08,burstMult:1.35},
  {name:"Medium", spawnMin:0.75,spawnMax:1.10,speedMin:200,speedMax:290,burstChance:0.14,burstMult:1.55},
  {name:"Hard",   spawnMin:0.55,spawnMax:0.85,speedMin:230,speedMax:340,burstChance:0.22,burstMult:1.80},
];
let diffIndex=1;

// ---------- state ----------
let state="menu"; // menu/play/shop/campaign/gameover/unlock
let menuIndex=0;
let shopIndex=0;
let codeInput="";

// save button rect
const saveBtn={x:820,y:10,w:70,h:28};

// name box rect
const nameBox={x:560,y:190,w:300,h:34};

// ---------- huskies ----------
const huskies=[
  {name:"Grey Husky", type:"normal"},
  {name:"Black & White Husky", type:"normal2"},
  {name:"Brown Husky", type:"normal3"},
  {name:"White Husky", type:"normal4"},
  {name:"🌈🙂 Balanced Rainbow (streak)", type:"balanced"},
  {name:"🌈🔥 OP Rainbow (code)", type:"op"},
];
function availableHuskies(){
  return huskies.filter(h=>{
    if(h.type==="balanced") return balancedRainbow;
    if(h.type==="op") return opRainbow;
    return true;
  });
}
let huskyType="normal";

// ---------- player/run ----------
const JUMP=950, GRAV=2500;
let runner, hunters=[], coins=[], meats=[], shields=[], doubles=[];
let tHunter=0,nextHunterAt=1;
let tCoin=0,tMeat=0,tShield=0,tDouble=0;

let score=0;
let energy=100;
const ENERGY_DRAIN=6.5;
let shieldCharges=0;
let doubleUntil=0;

let runStartHB=0;
let runEarnedHB=0;
let runDistance=0;

function doubleActive(){ return now()<doubleUntil; }

// trails
const fireTrail=[];
const goldPaws=[];
function addGoldPaw(x,y){ goldPaws.push({x,y,life:1.2}); if(goldPaws.length>90) goldPaws.shift(); }
function updateGold(dt){ for(let i=goldPaws.length-1;i>=0;i--){ goldPaws[i].life-=dt; if(goldPaws[i].life<=0) goldPaws.splice(i,1);} }
function updateFire(dt){ for(let i=fireTrail.length-1;i>=0;i--){ fireTrail[i].life-=dt; fireTrail[i].size*=0.98; if(fireTrail[i].life<=0) fireTrail.splice(i,1);} }
function fireColor(){
  const colors=["#ff0000","#ff6600","#ffff00","#00aaff"];
  const t=now()/300;
  const i=Math.floor(t%colors.length), j=(i+1)%colors.length, f=t%1;
  const a=colors[i], b=colors[j];
  const ar=parseInt(a.slice(1,3),16), ag=parseInt(a.slice(3,5),16), ab=parseInt(a.slice(5,7),16);
  const br=parseInt(b.slice(1,3),16), bg=parseInt(b.slice(3,5),16), bb=parseInt(b.slice(5,7),16);
  const rr=Math.round(ar+(br-ar)*f), rg=Math.round(ag+(bg-ag)*f), rb=Math.round(ab+(bb-ab)*f);
  return `rgb(${rr},${rg},${rb})`;
}

// snow
const snow=[];
function initSnow(){
  snow.length=0;
  for(let i=0;i<140;i++){
    snow.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:rand(1,3),vy:rand(30,140),vx:rand(-25,25),w:rand(0,6.28),ws:rand(0.8,2.2)});
  }
}
function updateSnow(dt){
  for(const s of snow){
    s.w+=s.ws*dt;
    s.x+=(s.vx+Math.sin(s.w)*18)*dt;
    s.y+=s.vy*dt;
    if(s.y>canvas.height+10){ s.y=-10; s.x=Math.random()*canvas.width; }
    if(s.x<-20) s.x=canvas.width+20;
    if(s.x>canvas.width+20) s.x=-20;
  }
}

// ---------- shop items ----------
const shopItems=[
  {id:"scarf_red", name:"Red Scarf", price:25, kind:"equip", type:"scarf"},
  {id:"scarf_blue", name:"Blue Scarf", price:25, kind:"equip", type:"scarf"},
  {id:"beanie", name:"Beanie", price:40, kind:"equip", type:"hat"},
  {id:"sunglasses", name:"Sunglasses", price:50, kind:"equip", type:"eyes"},
  {id:"tag", name:"Collar Tag", price:30, kind:"equip", type:"collar"},

  {id:"shield", name:"Shield (1 hit)", price:35, kind:"use"},
  {id:"double", name:"Double HB (15s)", price:60, kind:"use"},

  {id:"skin_fire", name:"🔥 Skin: Husky on Fire (EPIC)", price:250, kind:"skin", skin:"fire"},
  {id:"skin_cyber", name:"⚡🤖 Skin: Cyber Husky (LEG)", price:500, kind:"skin", skin:"cyber"},
  {id:"skin_golden", name:"👑💰 Skin: Gold Encrusted (MYTH)", price:750, kind:"skin", skin:"golden"},
  {id:"skin_rider", name:"🧑‍🦱🐺 Skin: Rider (EPIC)", price:275, kind:"skin", skin:"rider"},
];

function equipExclusive(type, id){
  for(const k in cosmetics){
    if(cosmetics[k] && shopItems.find(x=>x.id===k)?.type===type) cosmetics[k].equipped=false;
  }
  cosmetics[id].equipped=true;
}

function buyShop(){
  const it=shopItems[shopIndex];
  if(!it) return;

  if(it.kind==="equip"){
    const slot=cosmetics[it.id];
    if(slot.owned){
      if(slot.equipped) slot.equipped=false;
      else equipExclusive(it.type,it.id);
      toast(slot.equipped?"Equipped ✅":"Unequipped ✅",1200);
      saveNow();
      return;
    }
    if(huskyBucks<it.price) return toast("Not enough HB ❌",1400);
    huskyBucks-=it.price;
    slot.owned=true;
    equipExclusive(it.type,it.id);
    toast("Bought ✅",1400);
    saveNow();
    return;
  }

  if(it.kind==="use"){
    if(huskyBucks<it.price) return toast("Not enough HB ❌",1400);
    huskyBucks-=it.price;
    if(it.id==="shield") shieldCharges++;
    if(it.id==="double") doubleUntil=Math.max(now(),doubleUntil)+15000;
    toast("Activated ✅",1400);
    saveNow();
    return;
  }

  if(it.kind==="skin"){
    if(skinsOwned[it.skin]){
      skinEquipped=it.skin;
      toast("Equipped ✅",1400);
      saveNow();
      return;
    }
    if(huskyBucks<it.price) return toast("Not enough HB ❌",1400);
    huskyBucks-=it.price;
    skinsOwned[it.skin]=true;
    skinEquipped=it.skin;
    toast("Skin Unlocked ✅",1600);
    saveNow();
  }
}

// ---------- codes ----------
function redeem(codeRaw){
  const code=(codeRaw||"").trim().toUpperCase();
  if(!code) return;

  if(code==="1026"){ huskyBucks+=1026; toast("+1026 HB 🎉",2000); }
  else if(code==="GOATWARREN"){ opRainbow=true; toast("🌈🔥 OP Rainbow unlocked!",2200); }
  else if(code==="GLITCH"){ skinsOwned.cyber=true; skinEquipped="cyber"; toast("⚡🤖 Cyber unlocked!",2200); }
  else if(code==="ILUVGOLD"){ skinsOwned.golden=true; skinEquipped="golden"; toast("👑💰 Gold unlocked!",2200); }
  else if(code==="ULTIMATEEXP"){
    seasonXP=(40-1)*50; seasonTier=40;
    for(let t=1;t<=40;t++) claimTier(t);
    toast("Season completed 🚀",2400);
  }
  else toast("Invalid code ❌",1400);

  codeInput="";
  saveNow();
}

// ---------- daily streak ----------
function applyDaily(){
  const t=todayStr();
  if(lastDaily===t) return;
  if(lastDaily===yestStr()) streak++;
  else streak=1;
  if(streak>7) streak=1;

  const table=[5,6,7,8,10,12,15];
  huskyBucks+=table[streak-1];

  if(streak===7){
    balancedRainbow=true;
    toast(`Day 7! +${table[6]} HB + Balanced Rainbow 🌈🙂`,2600);
  }else{
    toast(`Daily +${table[streak-1]} HB (Streak ${streak}/7)`,2200);
  }
  lastDaily=t;
  saveNow();
}

// ---------- season pass ----------
function ensureSeason(){
  if(seasonStartMs===null) seasonStartMs=now();
  // reset if expired
  const end=seasonStartMs + seasonDays*DAY;
  if(now()>=end){
    seasonStartMs=now();
    seasonXP=0;
    seasonTier=1;
    seasonClaimed=new Set();
    toast("New season started!",2000);
  }
}
function tierFromXP(xp){ return clamp(Math.floor(xp/50)+1,1,40); }
function claimTier(t){
  if(seasonClaimed.has(t)) return;
  seasonClaimed.add(t);

  if(t%5===0) huskyBucks+=50;
  if(t===40){
    skinsOwned.frostking=true;
    skinEquipped="frostking";
    toast("👑❄️ Tier 40: Divine Frost King!",2600);
  }
}
function checkTierUp(){
  const nt=tierFromXP(seasonXP);
  if(nt>seasonTier){
    for(let t=seasonTier+1;t<=nt;t++) claimTier(t);
    seasonTier=nt;
    toast(`Tier up! Tier ${seasonTier}`,1600);
  }
}

// ---------- campaign + boss ----------
let campaignLevel=0;
let bossActive=false;
let bossTimer=0;
let bossDuration=60;
let winnerUntil=0;
function startCampaign(level){
  campaignLevel=level;
  bossActive = (level===10);
  bossTimer=0;
  state="play";
  startRun();
  toast(`Campaign Level ${level} 시작!`,1600);
}
function updateBoss(dt){
  if(!bossActive) return;
  bossTimer+=dt;
  if(bossTimer>=bossDuration){
    bossActive=false;
    winnerUntil=now()+3200;
    skinsOwned.cosmolight=true;
    skinEquipped="cosmolight";
    toast("WINNER! ⚡🌌 Lightning Cosmo unlocked!",2800);
    campaignUnlocked=Math.max(campaignUnlocked, 11);
    saveNow();
  }
}

// ---------- leaderboards ----------
function addLB(list, entry, key){
  list.push(entry);
  list.sort((a,b)=>(b[key]||0)-(a[key]||0));
  if(list.length>10) list.length=10;
}
function recordRun(){
  const date=todayStr();
  const nm=playerName;
  const coinsEarned=Math.max(0, Math.floor(runEarnedHB));
  const dist=Math.max(0, Math.floor(runDistance));

  if(coinsEarned>0) addLB(leaderboards.coins, {name:nm, coins:coinsEarned, date}, "coins");
  if(dist>0) addLB(leaderboards.distance, {name:nm, distance:dist, date}, "distance");
  saveNow();
}

// ---------- spawners ----------
function scheduleHunter(){
  const d=diffs[diffIndex];
  nextHunterAt=rand(d.spawnMin,d.spawnMax);
}
function spawnHunter(){
  const d=diffs[diffIndex];
  const lane=Math.floor(Math.random()*LANES);
  const burst=Math.random()<d.burstChance;
  const sp=rand(d.speedMin,d.speedMax)*(burst?d.burstMult:1);
  hunters.push({lane, x:laneX[lane]-26, y:-70, w:52, h:52, speed:sp});
}
let lastCoinLane=-1, lastMeatLane=-1;
function pickLaneAvoid(bads){
  const bad=new Set((bads||[]).filter(x=>x>=0));
  if(bad.size>=LANES) return Math.floor(Math.random()*LANES);
  let lane=Math.floor(Math.random()*LANES);
  while(bad.has(lane)) lane=Math.floor(Math.random()*LANES);
  return lane;
}
function spawnCoin(){
  const lane=pickLaneAvoid([lastMeatLane]);
  lastCoinLane=lane;
  coins.push({lane, x:laneX[lane]-14, y:-40, w:28, h:28, speed:rand(170,240)});
}
function spawnMeat(){
  const lane=pickLaneAvoid([lastCoinLane]);
  lastMeatLane=lane;
  meats.push({lane, x:laneX[lane]-15, y:-40, w:30, h:30, speed:rand(170,240)});
}
function spawnShieldDrop(){
  const lane=pickLaneAvoid([lastCoinLane,lastMeatLane]);
  shields.push({lane, x:laneX[lane]-15, y:-40, w:30, h:30, speed:rand(170,240)});
}
function spawnDoubleDrop(){
  const lane=pickLaneAvoid([lastCoinLane,lastMeatLane]);
  doubles.push({lane, x:laneX[lane]-15, y:-40, w:30, h:30, speed:rand(170,240)});
}

// ---------- start run ----------
function startRun(){
  ensureSeason();
  applyDaily();

  score=0; energy=100;
  hunters=[]; coins=[]; meats=[]; shields=[]; doubles=[];
  tHunter=tCoin=tMeat=tShield=tDouble=0;
  lastCoinLane=-1; lastMeatLane=-1;
  shieldCharges=0; doubleUntil=0;

  // OP rainbow small buff
  if(huskyType==="op") shieldCharges=1;

  runner={
    lane:1, target:1,
    x:laneX[1], y:groundY, w:52,h:52,
    jumpY:0, v:0, jumping:false, alive:true
  };

  scheduleHunter();
  runStartHB=huskyBucks;
  runEarnedHB=0;
  runDistance=0;
}

// ---------- collisions & update ----------
function updatePlay(dt){
  // energy drain (op rainbow drains slower)
  const drain = (huskyType==="op") ? ENERGY_DRAIN*0.85 : ENERGY_DRAIN;
  energy -= drain*dt;
  if(energy<=0){
    energy=0;
    state="gameover";
    endRun();
    return;
  }

  score += dt*10;
  runDistance=Math.floor(score);

  // smooth lane move
  runner.x += (laneX[runner.target]-runner.x)*Math.min(1,18*dt);

  // jump
  if(runner.jumping){
    runner.jumpY += runner.v*dt;
    runner.v -= GRAV*dt;
    if(runner.jumpY<=0){
      runner.jumpY=0;
      runner.v=0;
      runner.jumping=false;
    }
  }
  runner.y = groundY - runner.jumpY;

  // spawns
  tHunter+=dt;
  if(tHunter>=nextHunterAt){ spawnHunter(); tHunter=0; scheduleHunter(); }

  tCoin+=dt; if(tCoin>=rand(0.55,0.95)){ spawnCoin(); tCoin=0; }
  tMeat+=dt; if(tMeat>=rand(2.6,4.2)){ spawnMeat(); tMeat=0; }
  tShield+=dt; if(tShield>=rand(7.5,11.0)){ spawnShieldDrop(); tShield=0; }
  tDouble+=dt; if(tDouble>=rand(8.5,12.0)){ spawnDoubleDrop(); tDouble=0; }

  // move entities
  for(const h of hunters) h.y += h.speed*dt;
  for(const c of coins) c.y += c.speed*dt;
  for(const m of meats) m.y += m.speed*dt;
  for(const s of shields) s.y += s.speed*dt;
  for(const d of doubles) d.y += d.speed*dt;

  hunters=hunters.filter(o=>o.y<canvas.height+100);
  coins=coins.filter(o=>o.y<canvas.height+100);
  meats=meats.filter(o=>o.y<canvas.height+100);
  shields=shields.filter(o=>o.y<canvas.height+100);
  doubles=doubles.filter(o=>o.y<canvas.height+100);

  // trails
  if(skinEquipped==="fire"){
    fireTrail.push({x:runner.x+rand(-16,16), y:runner.y+runner.h-6+rand(-3,3), size:rand(8,16), life:0.7, color:fireColor()});
    if(fireTrail.length>140) fireTrail.shift();
  }
  if(skinEquipped==="golden" && !runner.jumping && Math.random()<0.55){
    addGoldPaw(runner.x-10+rand(-6,6), runner.y+runner.h-4);
  }

  // collisions: hunter (must be on ground to collide)
  for(let i=hunters.length-1;i>=0;i--){
    const h=hunters[i];
    if(h.lane!==runner.target) continue;
    if(runner.jumping) continue;
    const hit={x:runner.x-26,y:runner.y,w:runner.w,h:runner.h};
    if(rects(hit,h)){
      if(shieldCharges>0){
        shieldCharges--;
        hunters.splice(i,1);
      }else{
        state="gameover";
        endRun();
      }
      break;
    }
  }

  // pickups
  const phit={x:runner.x-26,y:runner.y,w:runner.w,h:runner.h};

  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];
    if(c.lane!==runner.target) continue;
    if(rects(phit,c)){
      let add = doubleActive()?2:1;
      if(huskyType==="balanced" && Math.random()<0.10) add+=1; // balanced rainbow bonus
      if(huskyType==="op") add+=1; // op bonus
      huskyBucks += add;
      coins.splice(i,1);
    }
  }
  for(let i=meats.length-1;i>=0;i--){
    const m=meats[i];
    if(m.lane!==runner.target) continue;
    if(rects(phit,m)){
      energy=Math.min(100, energy+30);
      meats.splice(i,1);
    }
  }
  for(let i=shields.length-1;i>=0;i--){
    const s=shields[i];
    if(s.lane!==runner.target) continue;
    if(rects(phit,s)){
      shieldCharges++;
      shields.splice(i,1);
    }
  }
  for(let i=doubles.length-1;i>=0;i--){
    const d=doubles[i];
    if(d.lane!==runner.target) continue;
    if(rects(phit,d)){
      doubleUntil=Math.max(now(),doubleUntil)+15000;
      doubles.splice(i,1);
    }
  }

  // boss
  updateBoss(dt);
}

function endRun(){
  // season XP gain
  let gained=Math.floor(score/2);
  if(diffIndex===2) gained+=5;
  seasonXP += gained;
  checkTierUp();

  // rank rewards (simple)
  const dist=Math.floor(score);
  if(dist>bestDistance){
    bestDistance=dist;
    if(bestDistance>=100) huskyBucks+=250; // platinum reward
    if(bestDistance>=1000) skinsOwned.cartoon=true; // prestige reward
  }

  runEarnedHB = Math.max(0, huskyBucks - runStartHB);
  recordRun();
  saveNow();
}

// ---------- drawing ----------
function drawSnow(){
  ctx.fillStyle="#cfefff";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // lane lines
  ctx.strokeStyle="rgba(80,140,170,0.55)";
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo((laneX[0]+laneX[1])/2,0); ctx.lineTo((laneX[0]+laneX[1])/2,canvas.height); ctx.stroke();
  ctx.beginPath(); ctx.moveTo((laneX[1]+laneX[2])/2,0); ctx.lineTo((laneX[1]+laneX[2])/2,canvas.height); ctx.stroke();

  // ground snow
  ctx.fillStyle="#ffffff";
  ctx.fillRect(0, groundY+40, canvas.width, canvas.height-(groundY+40));

  // flakes
  ctx.fillStyle="rgba(255,255,255,0.95)";
  for(const s of snow){
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
}

function drawRunner(){
  // trails behind
  for(const f of fireTrail){
    ctx.globalAlpha=clamp(f.life,0,1);
    ctx.fillStyle=f.color;
    ctx.beginPath(); ctx.arc(f.x,f.y,f.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  for(const gp of goldPaws){
    ctx.globalAlpha=clamp(gp.life,0,1)*0.95;
    ctx.font="18px Arial";
    ctx.fillStyle="gold";
    ctx.fillText("🐾", gp.x, gp.y);

      ctx.fillStyle="white";
      ctx.font="14px Arial";
      ctx.fillText("✨", gp.x+rand(-8,8), gp.y+rand(-10,2));
    }
  }
  ctx.globalAlpha=1;

  // body emoji (simple)
  let face="🐺";
  if(huskyType==="balanced") face="🌈🐺";
  if(huskyType==="op") face="🔥🌈🐺";

  // skin overlays
  if(skinEquipped==="cyber") face="🤖🐺";
  if(skinEquipped==="golden") face="👑🐺";
  if(skinEquipped==="rider") face="🧑‍🦱🐺";
  if(skinEquipped==="frostking") face="👑❄️🐺";
  if(skinEquipped==="cosmolight") face="⚡🌌🐺";
  if(skinEquipped==="cartoon") face="🐶";

  ctx.font="52px Arial";
  ctx.fillText(face, runner.x-28, runner.y+48);

    ctx.fillStyle=cosmetics.scarf_red.equipped?"red":"blue";
    ctx.fillRect(runner.x-26, runner.y+28, 52, 7);

    ctx.fillRect(runner.x-18, runner.y-6, 36, 10);
  }
  if(cosmetics.sunglasses.equipped){

    ctx.fillRect(runner.x-10, runner.y+18, 30, 6);

  if(cosmetics.tag.equipped){

}

// ---------- input ----------
function setNamePrompt(){
  const n=safeName(prompt("Enter your name (max 16 chars):", playerName));
  if(!n) return;
  playerName=n;
  saveNow();
  toast(`Name: ${playerName}`, 1600);
}

document.addEventListener("keydown",(e)=>{
  const k=e.key;

  if(state==="menu"){
    const avail=availableHuskies();
    if(k==="ArrowUp") menuIndex=(menuIndex-1+avail.length)%avail.length;
    if(k==="ArrowDown") menuIndex=(menuIndex+1)%avail.length;
    if(k==="ArrowLeft") diffIndex=(diffIndex-1+diffs.length)%diffs.length;
    if(k==="ArrowRight") diffIndex=(diffIndex+1)%diffs.length;
    if(k==="Enter"){
      const pick=avail[menuIndex];
      huskyType = pick.type==="balanced"?"balanced": pick.type==="op"?"op":"normal";
      state="play";
      startRun();
    }
    if(k==="b"||k==="B") state="shop";
    if(k==="c"||k==="C") state="campaign";
    if(k==="n"||k==="N") setNamePrompt();
    return;
  }

  if(state==="campaign"){
    if(k==="Escape") state="menu";
    // number keys 1-10
    const n=parseInt(k,10);
    if(n>=1 && n<=10){
      if(n<=Math.min(campaignUnlocked,10)){
        startCampaign(n);
        if(n===10) bossActive=true;
      }else toast("Locked 🔒", 1200);
    }
    return;
  }

  if(state==="gameover"){
    if(k==="r"||k==="R"){ state="menu"; }
    return;
  }

  if(state==="shop"){
    if(k==="ArrowUp") shopIndex=(shopIndex-1+shopItems.length)%shopItems.length;
    if(k==="ArrowDown") shopIndex=(shopIndex+1)%shopItems.length;

    if(k==="Enter"){
      if(codeInput.trim().length>0) redeem(codeInput);
      else buyShop();
    }

    if(k==="Backspace") codeInput=codeInput.slice(0,-1);
    if(k.length===1){
      const ch=k.toUpperCase();
      if(((ch>="A"&&ch<="Z")||(ch>="0"&&ch<="9")) && codeInput.length<16) codeInput+=ch;
    }

    if(k==="b"||k==="B"){ state="menu"; saveNow(); }
    if(k==="e"||k==="E"){
      const out=exportSaveString();
      prompt("Copy this Export Save code and paste it on your other device:", out);
    }
    if(k==="i"||k==="I"){
      const inp=prompt("Paste Export Save code here to import:");
      if(inp) importSaveString(inp);
    }
    return;
  }

  if(state==="play"){
    if(k==="ArrowLeft") runner.target=clamp(runner.target-1,0,LANES-1);
    if(k==="ArrowRight") runner.target=clamp(runner.target+1,0,LANES-1);
    if((k==="ArrowUp"||k===" ") && !runner.jumping){
      runner.jumping=true; runner.v=JUMP;
    }
    if(k==="b"||k==="B") state="shop";
    return;
  }
});

canvas.addEventListener("pointerdown",(ev)=>{
  const r=canvas.getBoundingClientRect();
  const x=(ev.clientX-r.left)*(canvas.width/r.width);
  const y=(ev.clientY-r.top)*(canvas.height/r.height);

  // save
  if(x>=saveBtn.x && x<=saveBtn.x+saveBtn.w && y>=saveBtn.y && y<=saveBtn.y+saveBtn.h){
    saveNow(); return;
  }

  // name edit
  if(state==="menu"){
    if(x>=nameBox.x && x<=nameBox.x+nameBox.w && y>=nameBox.y && y<=nameBox.y+nameBox.h){
      setNamePrompt(); return;
    }
  }

  // tap jump
  if(state==="play" && !runner.jumping){
    runner.jumping=true; runner.v=JUMP;
  }
});

// ---------- main loop ----------
let last=now();
initSnow();
function loop(){
  const t=now();
  const dt=Math.min(0.033, (t-last)/1000);
  last=t;

  updateSnow(dt);
  updateGold(dt);
  updateFire(dt);

  if(state==="play") updatePlay(dt);

  // draw
  if(state==="menu") drawMenu();
  else if(state==="shop") drawShop();
  else if(state==="campaign") drawCampaign();
  else if(state==="play"){
    drawSnow();
    drawEntities();
    drawRunner();
    drawTopUI();
    drawBossUI();
    drawWinner();
  }
  else if(state==="gameover") drawGameOver();

  requestAnimationFrame(loop);
}
loop();
